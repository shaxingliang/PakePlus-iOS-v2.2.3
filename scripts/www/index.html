<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>FluoroSense | 荧光图像批量分析工具</title>
    <!-- GeoTIFF 解析库 (极简版工具需要) -->
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <style>
        /* ========= 全局重置 ========= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========= 主应用样式 (极简版图像分析工具) ========= */
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            color: white;
            padding: 30px;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 5px;
            background: #fafafa;
            cursor: pointer;
        }
        .calculate-btn {
            background-color: #4a6491;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        .calculate-btn:hover {
            background-color: #3a5479;
        }
        .calculate-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .processing {
            background-color: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }
        .error-log {
            margin-top: 20px;
            background-color: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #c62828;
            display: none;
            word-wrap: break-word;
        }
        .results-container {
            margin-top: 30px;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .summary-row {
            font-weight: bold;
            background-color: #eef2f7 !important;
            color: #1565c0;
        }
        .info-box {
            background-color: #e8f4f8;
            border-radius: 5px;
            padding: 15px;
            margin-top: 30px;
            font-size: 0.9rem;
            border-left: 4px solid #4a6491;
        }
        .info-box ul {
            margin-left: 20px;
        }

        /* ========= 荧光启动屏幕样式 (FluoroSense Splash Screen) ========= */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 40% 35%, #0a1f2e, #02060c);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 1;
            pointer-events: auto;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        .splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* 荧光动态背景层 */
        .fluor-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .glow-orb {
            position: absolute;
            width: 70vmax;
            height: 70vmax;
            border-radius: 50%;
            filter: blur(70px);
            animation: floatGlow 22s infinite alternate ease-in-out;
        }
        .glow-orb-1 {
            top: -30%;
            left: -20%;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.12), rgba(59, 130, 246, 0));
            animation-duration: 26s;
        }
        .glow-orb-2 {
            bottom: -40%;
            right: -25%;
            width: 80vmax;
            height: 80vmax;
            background: radial-gradient(circle, rgba(150, 0, 255, 0.08), rgba(0, 20, 40, 0));
            animation-duration: 30s;
            animation-delay: -3s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(4%, 6%) scale(1.08); opacity: 0.7; }
        }

        .particle-matrix {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 25% 40%, rgba(0, 230, 200, 0.2) 1px, transparent 1px);
            background-size: 38px 38px;
            opacity: 0.35;
            animation: driftMatrix 20s infinite linear;
        }

        @keyframes driftMatrix {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .scan-ribbon {
            position: absolute;
            width: 120%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffcc, #3b82f6, #a855f7, transparent);
            top: 45%;
            left: -10%;
            filter: blur(2px);
            animation: scanMove 6s infinite ease-in-out;
            opacity: 0.5;
            border-radius: 4px;
        }

        @keyframes scanMove {
            0% { top: 20%; opacity: 0; transform: translateX(-20%); }
            40% { opacity: 0.8; }
            80% { top: 70%; opacity: 0.6; }
            100% { top: 20%; opacity: 0; transform: translateX(20%); }
        }

        .micro-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ffcc;
            border-radius: 50%;
            opacity: 0.5;
            box-shadow: 0 0 4px #00ffcc;
            animation: floatDot 8s infinite alternate;
        }
        @keyframes floatDot {
            0% { transform: translateY(0px) scale(1); opacity: 0.2; }
            100% { transform: translateY(-35px) scale(1.5); opacity: 0.8; }
        }

        .hero-content {
            position: relative;
            z-index: 20;
            text-align: center;
            padding: 20px;
            max-width: 90vw;
            animation: subtleRise 3.4s infinite alternate ease-in-out;
        }

        @keyframes subtleRise {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-5px); }
        }

        .fluor-icon {
            display: inline-block;
            margin-bottom: 28px;
            filter: drop-shadow(0 0 16px #00e6c3);
        }

        .main-title {
            font-size: clamp(48px, 10vw, 84px);
            font-weight: 800;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, #F0FCFF, #b5f0ff, #3bc9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px rgba(0, 200, 255, 0.3);
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .sub-main {
            font-size: clamp(30px, 7vw, 52px);
            font-weight: 700;
            letter-spacing: 0.08em;
            background: linear-gradient(120deg, #D9F0FF, #7ac8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 36px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.2);
        }

        .analysis-badge {
            margin-top: 18px;
            position: relative;
        }

        .analysis-text {
            font-size: clamp(26px, 6vw, 46px);
            font-weight: 700;
            letter-spacing: 3.5px;
            background: linear-gradient(125deg, #C8F7FF, #6bc2ff, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px rgba(0, 230, 200, 0.4);
            display: inline-block;
            padding: 8px 0;
        }

        .fluor-line {
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffcc, #3b82f6, #a855f7, transparent);
            margin: 18px auto 0;
            border-radius: 4px;
            animation: breathLine 2.8s infinite ease-in-out;
        }

        @keyframes breathLine {
            0% { width: 30%; opacity: 0.3; }
            50% { width: 88%; opacity: 0.95; }
            100% { width: 30%; opacity: 0.3; }
        }

        .dot-divider {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 36px 0 18px;
            opacity: 0.6;
        }
        .glow-dot {
            width: 6px;
            height: 6px;
            background: #3b82f6;
            border-radius: 50%;
            animation: dotGlow 2s infinite alternate;
            box-shadow: 0 0 6px #00ffcc;
        }
        .glow-dot:nth-child(2) { animation-delay: 0.4s; background: #00e6c3; }
        .glow-dot:nth-child(3) { animation-delay: 0.8s; background: #a855f7; }

        @keyframes dotGlow {
            0% { transform: scale(0.8); opacity: 0.4; }
            100% { transform: scale(1.5); opacity: 1; }
        }

        .loader-area {
            position: absolute;
            bottom: 12%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
        }
        .loader-dot {
            width: 7px;
            height: 7px;
            background-color: #3bc9ff;
            border-radius: 50%;
            opacity: 0.5;
        }
        .loader-dot:nth-child(1) { animation: loaderPulse 1.4s infinite 0.1s; }
        .loader-dot:nth-child(2) { animation: loaderPulse 1.4s infinite 0.4s; background-color: #00e6c3; }
        .loader-dot:nth-child(3) { animation: loaderPulse 1.4s infinite 0.7s; background-color: #c084fc; }

        @keyframes loaderPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #00ffcc; }
        }

        /* 开发者信息（中文） */
        .developer-credit {
            position: absolute;
            bottom: 5%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            font-family: 'Inter', monospace;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
            z-index: 20;
            background: transparent;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
            font-weight: 400;
        }

        @media (max-width: 550px) {
            .analysis-text { letter-spacing: 2px; }
            .loader-area { bottom: 10%; }
            .developer-credit { font-size: 12px; bottom: 3%; }
        }
    </style>
</head>
<body>

<!-- ========= 荧光启动界面 (停留4秒后消失，英文不动，增加开发者中文) ========= -->
<div class="splash-screen" id="splashScreen">
    <div class="fluor-bg">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="particle-matrix"></div>
        <div class="scan-ribbon"></div>
        <div class="micro-dot" style="top: 15%; left: 20%; animation-duration: 7s;"></div>
        <div class="micro-dot" style="top: 70%; left: 80%; animation-duration: 9s; animation-delay: 1s;"></div>
        <div class="micro-dot" style="top: 45%; left: 60%; animation-duration: 6s;"></div>
        <div class="micro-dot" style="top: 85%; left: 15%; animation-duration: 8s; animation-delay: 0.5s;"></div>
        <div class="micro-dot" style="top: 30%; left: 75%; animation-duration: 7.5s;"></div>
    </div>
    <div class="hero-content">
        <div class="fluor-icon">
            <svg width="68" height="68" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M24 6 L32 18 L24 30 L16 18 L24 6Z" fill="#00e6c3" fill-opacity="0.35" stroke="#00ffcc" stroke-width="1.2">
                    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" />
                </path>
                <circle cx="24" cy="24" r="3.5" fill="#3b82f6" stroke="#a0f0ff" stroke-width="1">
                    <animate attributeName="r" values="2.5;4;2.5" dur="2.4s" repeatCount="indefinite" />
                </circle>
                <path d="M8 38 L40 38" stroke="#00ffcc" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.8">
                    <animate attributeName="stroke-dashoffset" from="0" to="-24" dur="2s" repeatCount="indefinite" />
                </path>
                <path d="M14 32 L34 32" stroke="#c084fc" stroke-width="1" stroke-dasharray="3 3" opacity="0.5">
                    <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="2.5s" repeatCount="indefinite" />
                </path>
            </svg>
        </div>
        <div class="main-title">INFINITE</div>
        <div class="sub-main">POSSIBILITIES</div>
        <div class="dot-divider">
            <div class="glow-dot"></div>
            <div class="glow-dot"></div>
            <div class="glow-dot"></div>
        </div>
        <div class="analysis-badge">
            <div class="analysis-text">FLUORESCENCE ANALYSIS</div>
            <div class="fluor-line"></div>
        </div>
    </div>
    <div class="loader-area">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
    </div>
    <!-- 开发者信息（中文） -->
    <div class="developer-credit">开发者：沙兴良</div>
</div>

<!-- ========= 主应用：荧光图像批量分析工具 (极简版，完全中文化) ========= -->
<div class="container">
    <header>
        <h1>荧光图像批量分析工具</h1>
    </header>
    <div class="content">
        <div class="form-group">
            <label for="imageFiles">1. 请选择需要处理的图片（支持 .tif, .tiff, .png, .jpg）</label>
            <input type="file" id="imageFiles" multiple accept="image/*,.tif,.tiff">
        </div>
        
        <button class="calculate-btn" id="processBtn">开始分析</button>
        
        <div id="status"></div>
        <div id="errorLog" class="error-log"></div>

        <div id="resultsContainer" class="results-container">
            <h3 style="margin-bottom: 10px; color: #2c3e50; border-bottom: 2px solid #4a6491; padding-bottom: 5px;">分析结果详情</h3>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>图片名称</th>
                        <th>平均荧光强度</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
        
        <div class="info-box">
            <h3>执行逻辑说明：</h3>
            <ul>
                <li><strong>底层直读：</strong> 直接解析图片底层矩阵数据，防止大文件导致崩溃。</li>
                <li><strong>精准测量：</strong> 仅过滤并测量提取通道亮度在 50-255 之间的像素的<strong>平均荧光强度</strong>。</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // ========= 启动界面控制逻辑 (停留4秒后移除) =========
    (function() {
        const splash = document.getElementById('splashScreen');
        if (!splash) return;

        window.addEventListener('load', function() {
            setTimeout(function() {
                splash.classList.add('fade-out');
                setTimeout(function() {
                    if (splash && splash.parentNode) {
                        splash.parentNode.removeChild(splash);
                    }
                    document.body.style.overflow = '';
                    console.log('[启动界面] 已关闭，主应用就绪');
                }, 900);
            }, 4000);
        });
    })();

    // ========= 以下为极简版图像分析工具完整逻辑 (全中文化) =========
    document.getElementById('processBtn').addEventListener('click', async function() {
        const files = document.getElementById('imageFiles').files;
        const statusDiv = document.getElementById('status');
        const errorLog = document.getElementById('errorLog');
        const btn = document.getElementById('processBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsBody = document.getElementById('resultsBody');

        if (files.length === 0) {
            alert("请先选择图片文件！");
            return;
        }

        btn.disabled = true;
        statusDiv.style.display = 'block';
        statusDiv.className = 'processing';
        statusDiv.innerHTML = `正在处理 ${files.length} 张图片，请稍候...`;
        errorLog.style.display = 'none';
        errorLog.innerHTML = '<strong>错误日志：</strong><br>';
        resultsContainer.style.display = 'none';
        resultsBody.innerHTML = '';

        let totalMean = 0;
        let successCount = 0;
        let errorCount = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            try {
                const data = await processFile(file);
                const meanVal = data.mean.toFixed(3);
                
                const row = `<tr><td>${file.name}</td><td>${meanVal}</td></tr>`;
                resultsBody.innerHTML += row;

                totalMean += data.mean;
                successCount++;
            } catch (err) {
                console.error("处理出错: " + file.name, err);
                errorCount++;
                errorLog.style.display = 'block';
                const errorMsg = err.message || "未知底层崩溃";
                errorLog.innerHTML += `❌ 文件 <b>${file.name}</b> 处理失败: ${errorMsg}<br>`;
            }
        }

        if (successCount > 0) {
            const avgTotal = (totalMean / successCount).toFixed(3);
            const summaryHtml = `
                <tr class="summary-row"><td>统计项：成功处理图片总数</td><td>${successCount} 张</td></tr>
                <tr class="summary-row"><td>统计项：所有图片总平均值</td><td>${avgTotal}</td></tr>
            `;
            resultsBody.innerHTML += summaryHtml;
            
            resultsContainer.style.display = 'block';
            statusDiv.className = 'success';
            statusDiv.innerHTML = `处理完成！成功 ${successCount} 张，失败 ${errorCount} 张。结果已显示在下方。`;
            
            alert(`亲爱的沙兴良先生，所有图片都已处理完成！共成功处理了 ${successCount} 张图片。\n分析结果已直接显示在页面表格中。`);
        } else {
            statusDiv.style.display = 'none';
            alert("很抱歉，所有图片解析均失败。请查看页面下方的红色错误日志。");
        }
        btn.disabled = false;
    });

    async function processFile(file) {
        const isTiff = file.name.toLowerCase().match(/\.tiff?$/);
        if (isTiff) {
            return await processGeoTiff(file);
        } else {
            return await processStandardImage(file);
        }
    }

    async function processGeoTiff(file) {
        try {
            const arrayBuffer = await file.arrayBuffer();
            const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
            const image = await tiff.getImage();
            const rasters = await image.readRasters();
            let targetChannel = rasters.length >= 3 ? rasters[1] : rasters[0]; 
            let area = 0, sumGreen = 0;
            for (let i = 0; i < targetChannel.length; i++) {
                let val = targetChannel[i];
                if (val >= 50 && val <= 255) {
                    area++;
                    sumGreen += val;
                }
            }
            return { mean: area > 0 ? sumGreen / area : 0 };
        } catch (err) {
            throw new Error("GeoTIFF解析失败 - " + (err.message || String(err)));
        }
    }

    function processStandardImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0);
                const pixelData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let area = 0, sumGreen = 0;
                for (let i = 0; i < pixelData.length; i += 4) {
                    let g = pixelData[i + 1]; 
                    if (g >= 50 && g <= 255) {
                        area++;
                        sumGreen += g;
                    }
                }
                resolve({ mean: area > 0 ? sumGreen / area : 0 });
            };
            img.onerror = () => reject(new Error("浏览器无法读取该常规图片"));
            img.src = url;
        });
    }
</script>
</body>
</html>
